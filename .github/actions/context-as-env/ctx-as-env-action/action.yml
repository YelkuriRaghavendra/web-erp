name: Context as env vars
description: |
  This action will process vars and secret contexts then will set them as env vars.
inputs:
  secrets-context:
    description: "Secret context to be used to set env vars from, usually from toJson(vars)"
    required: false
    default: ""
  vars-context:
    description: "Vars Context to be used to set env vars from, usually from toJson(secrets)"
    required: false
    default: ""
  envs-context:
    description: "Vars Context to be used to set env vars from, usually from toJson(env)"
    required: false
    default: ""

runs:
  using: 'node20'
  main: 'dist/context-as-env/index.js'