name: Staging Build and Deploy SERHAFEN PORTAL WEB to CloudFront

on:
  push:
    branches:
      - main
      - cicd 
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-staging:
    name: Build & Deploy to S3 (Staging)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: 🛎️ Checkout Code
        uses: actions/checkout@v4

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Turn context into env vars
        id: turn-context-into-env-vars
        uses: serhafen-tech/serhafen-portal-web/.github/actions/context-as-env@main
        with:
          vars-context: ${{ toJson(vars) }}
          secrets-context: ${{ toJson(secrets) }}

      - name: 🛠️ Build for Staging
        run: pnpm run build

      - name: 🔐 Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::905418216463:role/Github_Actions
          role-session-name: github-actions
          aws-region: us-east-1

      - name: 🚀 Deploy to S3 (Staging)
        run: |
          aws s3 cp dist/ s3://serhafen-web-portal-stg/ --recursive
          aws cloudfront create-invalidation --distribution-id E3V90WV5AA56TL --paths "/*"
